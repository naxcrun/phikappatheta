<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>

        }
        @font-face {
            font-family: 'Cooper BT Bold';
            src: local('Cooper BT Bold'), local('Cooper Black'), serif;
        }
    </style>
    <script>

            theme: {
                extend: {
                    colors: {
                        brand: {
                            cardinal: '#711a12',
                            gold: '#d4ae67',
                            dark: '#1a1a1a',
                            light: '#fdfbf7'
                        }
                    },
                    fontFamily: {
                        heading: ['"Spartan League"', 'sans-serif'],
                        body: ['"Cooper BT Bold"', 'serif'],
                    }
                }

        }

<body class="bg-brand-light text-brand-dark font-body antialiased selection:bg-brand-gold selection:text-brand-dark flex flex-col min-h-screen">

    <nav class="w-full bg-white border-b-4 border-brand-gold shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-24 items-center">
                <a href="index.html" class="flex-shrink-0">

                    <a href="join.html" class="hover:text-brand-gold transition-colors">Join</a>
                    <a href="alumni.html" class="hover:text-brand-gold transition-colors">Alumni</a>
                    <a href="calendar.html" class="hover:text-brand-gold transition-colors">Calendar</a>
                    <a href="https://phikapp-portal.example.com" target="_blank" class="hover:text-brand-gold transition-colors">PhiKAPP Login</a>
                </div>
            </div>
        </div>

<main class="flex-grow">

            <div class="absolute inset-0 bg-brand-cardinal opacity-10"></div>

                <p class="font-body text-xl md:text-2xl text-gray-200 mb-12 max-w-2xl leading-relaxed">

                </p>
                
                <div class="flex flex-col sm:flex-row gap-6">
                    <a href="join.html" class="bg-brand-gold text-brand-cardinal font-heading text-xl px-10 py-4 uppercase tracking-widest hover:bg-yellow-500 transition-colors shadow-lg">Rush Indiana Zeta</a>
                </div>
            </div>
        </section>

    <footer class="bg-brand-cardinal text-white py-12 border-t-8 border-brand-gold mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center">
